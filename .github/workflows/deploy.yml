name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@v4

      - name: "📦 Install pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: "11.13.1"

      - name: "⚡ Use Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: "📦 Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "🔎 Type check & lint"
        run: pnpm run lint

      - name: "📝 Check code format"
        run: pnpm run format:check

      - name: "🚀 Build static site"
        run: pnpm run build

      - name: "🔑 Install sshpass & setup SSH key"
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
          mkdir -p ~/.ssh
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || '22' }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: "📂 Deploy to VPS via rsync"
        run: |
          sshpass -p "${{ secrets.VPS_SSH_PASSPHRASE }}" \
            rsync -avz --delete --no-perms --no-owner --no-group \
              -e "ssh -p ${{ secrets.VPS_PORT || '22' }} -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
              dist/ \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_REMOTE_PATH }}/
